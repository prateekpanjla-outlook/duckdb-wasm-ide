# Cloud Build configuration for automatic deployment to Cloud Run
# Trigger: Push to gcp-deployment branch
#
# This file handles:
# 1. Building the Docker image
# 2. Running database migrations (automatic)
# 3. Seeding database questions (automatic)
# 4. Deploying to Cloud Run

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'

  # Step 3: Run Database Migrations (Automatic)
  # Uses the migration script to create tables and indexes
  - name: 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
    id: 'migrate'
    entrypoint: 'node'
    args:
      - 'server/scripts/migrateDatabase.js'
    env:
      - 'NODE_ENV=production'
      - 'DB_HOST=/cloudsql/$_CLOUDSQL_CONNECTION'
      - 'DB_PORT=5432'
      - 'DB_NAME=$_DB_NAME'
      - 'DB_USER=$_DB_USER'
      - 'DB_PASSWORD=$_DB_PASSWORD'

  # Step 4: Seed Database Questions (Automatic)
  - name: 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
    id: 'seed'
    entrypoint: 'node'
    args:
      - 'server/seed/seedQuestions.js'
    env:
      - 'NODE_ENV=production'
      - 'DB_HOST=/cloudsql/$_CLOUDSQL_CONNECTION'
      - 'DB_PORT=5432'
      - 'DB_NAME=$_DB_NAME'
      - 'DB_USER=$_DB_USER'
      - 'DB_PASSWORD=$_DB_PASSWORD'

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - 'duckdb-ide'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      # Connect to Cloud SQL
      - '--set-cloudsql-instances=$_CLOUDSQL_CONNECTION'
      # Environment variables
      - '--set-env-vars'
      - 'NODE_ENV=production,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,DB_HOST=/cloudsql/$_CLOUDSQL_CONNECTION'
      - '--set-secrets'
      - 'DB_PASSWORD=$_DB_PASSWORD_SECRET:latest,JWT_SECRET=$_JWT_SECRET_SECRET:latest'

# Images to be pushed to Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'

# Substitution variables (set these in Cloud Build trigger settings)
substitutions:
  _DEPLOY_REGION: 'us-central1'
  _MEMORY: '512Mi'
  _CPU: '1'
  _MAX_INSTANCES: '10'
  # Cloud SQL connection (format: PROJECT:REGION:INSTANCE)
  _CLOUDSQL_CONNECTION: 'your-project:us-central1:duckdb-ide-db'
  # Database configuration
  _DB_NAME: 'duckdb_ide'
  _DB_USER: 'postgres'
  # Database password - set in trigger via --substitutions
  _DB_PASSWORD: 'your-password-here'
  # Secret Manager references
  _DB_PASSWORD_SECRET: 'db-password'
  _JWT_SECRET_SECRET: 'jwt-secret'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
