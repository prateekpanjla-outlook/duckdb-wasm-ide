# Cloud Build configuration for deployment to Cloud Run
# Project: sql-practice-project-489106
# Build SA: sql-practice-deployer@$PROJECT_ID.iam.gserviceaccount.com

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'
      - '.'

  # Step 2: Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide'

  # Step 3: Deploy to Cloud Run with Cloud SQL connection
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'duckdb-ide'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:us-central1:duckdb-ide-db'
      - '--set-env-vars'
      - 'DB_HOST=/cloudsql/$PROJECT_ID:us-central1:duckdb-ide-db,DB_PORT=5432,DB_NAME=duckdb_ide,DB_USER=postgres,JWT_EXPIRES_IN=7d,NODE_ENV=production'
      - '--set-secrets'
      - 'DB_PASSWORD=db-password:latest,JWT_SECRET=jwt-secret:latest,GEMINI_API_KEY=gemini-api-key:latest,ADMIN_SECRET=admin-secret:latest'
      - '--service-account'
      - 'sql-practice-runtime@$PROJECT_ID.iam.gserviceaccount.com'

# Build service account (least privilege — see task #78)
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/sql-practice-deployer@$PROJECT_ID.iam.gserviceaccount.com'

# Images to be pushed to Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'

options:
  logging: GCS_ONLY
  pool: {}  # use default pool
