# Cloud Build configuration for automatic deployment to Cloud Run
# Trigger: Push to gcp-deployment branch
#
# This file handles application deployment only.
# Database migrations are handled separately via Cloud Functions.
# See CLOUD_FUNCTIONS_DEPLOYMENT.md for database initialization.

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - 'duckdb-ide'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      # VPC Connector for Cloud SQL access
      - '--vpc-egress=private-ranges-only'
      - '--vpc-connector=duckdb-ide-vpc-connector'
      - '--vpc-connector-location=us-central1'
      # Connect to Cloud SQL
      - '--set-cloudsql-instances=$_CLOUDSQL_CONNECTION'
      # Environment variables
      - '--set-env-vars'
      - 'NODE_ENV=production,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,DB_HOST=/cloudsql/$_CLOUDSQL_CONNECTION'
      # Secrets from Secret Manager
      - '--set-secrets'
      - 'DB_PASSWORD=$_DB_PASSWORD_SECRET:latest,JWT_SECRET=$_JWT_SECRET_SECRET:latest'
      # Service account for the Cloud Run service
      - '--service-account'
      - 'cloud-run-sa@$PROJECT_ID.iam.gserviceaccount.com'

# Images to be pushed to Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/duckdb-ide-repo/duckdb-ide:latest'

# Substitution variables (set these in Cloud Build trigger settings)
# Note: These are only for Cloud Build trigger. For gcloud builds submit,
# you must provide ALL substitutions via --substitutions flag.
substitutions:
  # Required substitutions
  _CLOUDSQL_CONNECTION: 'your-project:us-central1:duckdb-ide-db'
  _DB_NAME: 'duckdb_ide'
  _DB_USER: 'postgres'
  _DB_PASSWORD_SECRET: 'db-password'
  _JWT_SECRET_SECRET: 'jwt-secret'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
