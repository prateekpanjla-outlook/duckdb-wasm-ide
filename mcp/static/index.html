<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Practice — Question Authoring Agent (MCP)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
        }
        .header input[type="password"] { width: 160px; }
        .header input[type="text"] { flex: 1; min-width: 200px; }
        .header button {
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .header button:hover { background: #2563eb; }
        .header button:disabled { background: #475569; cursor: not-allowed; }
        .header button.running { background: #ef4444; }

        /* Content */
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Agent Log (left panel) */
        .agent-log {
            width: 350px;
            min-width: 280px;
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 12px;
            flex-shrink: 0;
        }
        .agent-log h3 {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .step {
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.4;
        }
        .step-tool-call {
            background: #1e3a5f;
            border-left: 3px solid #3b82f6;
        }
        .step-tool-call .tool-name { color: #60a5fa; font-weight: 600; }
        .step-tool-result {
            background: #1a3329;
            border-left: 3px solid #22c55e;
            color: #86efac;
        }
        .step-answer {
            background: #312e81;
            border-left: 3px solid #818cf8;
        }
        .step-error {
            background: #3b1320;
            border-left: 3px solid #ef4444;
            color: #fca5a5;
        }
        .step-system {
            background: #422006;
            border-left: 3px solid #f59e0b;
            color: #fcd34d;
        }

        /* Prefab Frame (right panel) */
        .prefab-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            overflow: hidden;
        }
        .prefab-container h3 {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        #prefabFrame {
            flex: 1;
            border: none;
            width: 100%;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MCP Agent</h1>
        <input type="password" id="adminKey" placeholder="Admin Key">
        <input type="text" id="prompt" placeholder='e.g. "Add a question about INNER JOIN"'>
        <button id="runBtn" onclick="runAgent()">Run Agent</button>
    </div>

    <div class="content">
        <div class="agent-log" id="agentLog">
            <h3>Agent Log</h3>
            <div class="empty-state" id="logEmpty">Enter a prompt and click Run Agent</div>
        </div>
        <div class="prefab-container">
            <h3>Prefab UI</h3>
            <div class="empty-state" id="prefabEmpty">Tool results will render here</div>
            <iframe id="prefabFrame" style="display: none;"></iframe>
        </div>
    </div>

    <script>
        const logEl = document.getElementById('agentLog');
        const runBtn = document.getElementById('runBtn');
        let running = false;

        function addStep(type, content) {
            // Remove empty state on first step
            const empty = document.getElementById('logEmpty');
            if (empty) empty.remove();

            const div = document.createElement('div');
            div.className = `step step-${type}`;
            div.innerHTML = content;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        async function runAgent() {
            if (running) return;

            const adminKey = document.getElementById('adminKey').value.trim();
            const prompt = document.getElementById('prompt').value.trim();

            if (!adminKey) { alert('Enter admin key'); return; }
            if (!prompt) { alert('Enter a prompt'); return; }

            running = true;
            runBtn.textContent = 'Running...';
            runBtn.classList.add('running');
            runBtn.disabled = true;

            // Clear previous
            logEl.innerHTML = '<h3>Agent Log</h3>';

            try {
                const response = await fetch('/agent/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, admin_key: adminKey }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const events = buffer.split('\n\n');
                    buffer = events.pop();

                    for (const event of events) {
                        if (!event.startsWith('data: ')) continue;
                        const step = JSON.parse(event.slice(6));

                        switch (step.type) {
                            case 'tool_call':
                                addStep('tool-call',
                                    `<span class="tool-name">${escapeHtml(step.tool)}</span>`
                                    + (step.input ? `<br><small>${escapeHtml(JSON.stringify(step.input).substring(0, 100))}</small>` : '')
                                );
                                break;
                            case 'tool_result':
                                addStep('tool-result',
                                    `${escapeHtml(step.tool)} result`
                                    + (step.result ? `<br><small>${escapeHtml(JSON.stringify(step.result).substring(0, 150))}</small>` : '')
                                );
                                break;
                            case 'answer':
                                addStep('answer', `<strong>Answer:</strong><br><small>${escapeHtml((step.content || '').substring(0, 300))}...</small>`);
                                break;
                            case 'error':
                                addStep('error', escapeHtml(step.content || 'Unknown error'));
                                break;
                            case 'system':
                                addStep('system', escapeHtml(step.content || ''));
                                break;
                            case 'done':
                                addStep('system', 'Agent complete');
                                break;
                        }
                    }
                }
            } catch (err) {
                addStep('error', escapeHtml(err.message));
            }

            running = false;
            runBtn.textContent = 'Run Agent';
            runBtn.classList.remove('running');
            runBtn.disabled = false;
        }

        // Enter key to run
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runAgent();
        });
    </script>
</body>
</html>
